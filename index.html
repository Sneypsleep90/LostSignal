<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lost Signal — тихий трекер цифрового детокса."
    />
    <title>Lost Signal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #111111;
        --surface: #1b211c;
        --surface-dark: #141814;
        --muted: #4b514d;
        --fog: #7e837f;
        --text: #d9dbd8;
        --line: #252b26;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        isolation: isolate;
      }

      .app-shell::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        opacity: 0.16;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='160' height='160' filter='url(%23n)' opacity='0.34'/%3E%3C/svg%3E");
        background-size: 220px 220px;
        mix-blend-mode: soft-light;
      }

      .experience {
        position: relative;
        z-index: 2;
        display: grid;
        width: min(100%, 760px);
        min-height: 100vh;
        padding: clamp(30px, 5vw, 58px) 24px clamp(24px, 4vw, 44px);
        grid-template-rows: auto 1fr auto;
      }

      .brand-zone {
        display: grid;
        justify-items: center;
      }

      .brand {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.32em;
        line-height: 1;
        text-align: center;
      }

      .signal-line {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        opacity: 0.72;
      }

      .center-stage {
        display: grid;
        align-content: center;
        justify-items: center;
        width: 100%;
        padding-bottom: 5vh;
      }

      .hero-counter {
        display: grid;
        justify-items: center;
      }

      .hero-counter__number {
        color: var(--text);
        font-size: clamp(9rem, 21vw, 12rem);
        font-weight: 900;
        line-height: 0.8;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }

      .hero-counter__label {
        margin-top: 26px;
        color: var(--muted);
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.03em;
      }

      .statistics-panel {
        display: grid;
        justify-items: center;
        width: min(100%, 390px);
        margin-top: clamp(34px, 7vh, 64px);
        color: var(--fog);
        text-align: center;
      }

      .rule {
        width: min(100%, 340px);
        height: 1px;
        background: var(--line);
      }

      .hours {
        margin: 24px 0 28px;
        color: var(--fog);
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .location-label {
        margin: 0;
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.22em;
        line-height: 1;
        text-transform: uppercase;
      }

      .location-name {
        margin: 13px 0 28px;
        color: var(--fog);
        font-size: 25px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .started {
        margin: 23px 0 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.04em;
      }

      .journey-progress {
        position: relative;
        width: min(100%, 340px);
        height: 28px;
        margin-top: 24px;
      }

      .journey-progress__track,
      .journey-progress__fill {
        position: absolute;
        top: 13px;
        left: 0;
        height: 1px;
      }

      .journey-progress__track {
        width: 100%;
        background: var(--line);
      }

      .journey-progress__fill {
        background: var(--fog);
        opacity: 0.72;
      }

      .journey-progress__marker {
        position: absolute;
        top: 10px;
        width: 7px;
        height: 7px;
        border: 1px solid var(--muted);
        background: var(--bg);
        transform: translateX(-50%);
      }

      .journey-progress__marker.is-reached {
        border-color: var(--fog);
        background: var(--fog);
      }

      .forest-background {
        position: fixed;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        pointer-events: none;
      }

      .fog-layer {
        position: absolute;
        left: -18vw;
        width: 136vw;
        height: var(--fog-height);
        background: var(--fog);
        filter: blur(var(--fog-blur));
        opacity: var(--fog-opacity);
        transform: translate3d(0, 0, 0);
        animation: fog-drift var(--fog-duration) ease-in-out infinite alternate;
      }

      .fog-layer--high {
        top: 36%;
        --fog-height: 54px;
        --fog-blur: 24px;
        --fog-opacity: 0.022;
        --fog-duration: 34s;
      }

      .fog-layer--middle {
        top: 52%;
        --fog-height: 98px;
        --fog-blur: 34px;
        --fog-opacity: 0.038;
        --fog-duration: 46s;
      }

      .forest-road {
        position: absolute;
        right: 0;
        bottom: -2vh;
        left: 0;
        width: 100%;
        height: 42vh;
        opacity: 0.16;
      }

      .tree-line {
        position: absolute;
        right: -4vw;
        bottom: var(--tree-bottom);
        left: -4vw;
        width: 108vw;
        height: var(--tree-height);
        overflow: visible;
        opacity: var(--tree-opacity);
        transform: translate3d(0, 0, 0);
        animation: forest-drift var(--tree-duration) ease-in-out infinite alternate;
      }

      .tree-line--far {
        --tree-bottom: 8vh;
        --tree-height: min(26vh, 230px);
        --tree-opacity: 0.38;
        --tree-duration: 38s;
      }

      .tree-line--middle {
        --tree-bottom: 2vh;
        --tree-height: min(31vh, 270px);
        --tree-opacity: 0.56;
        --tree-duration: 30s;
      }

      .tree-line--near {
        --tree-bottom: -5px;
        --tree-height: min(38vh, 330px);
        --tree-opacity: 0.82;
        --tree-duration: 24s;
      }

      .pine {
        transform-box: fill-box;
        transform-origin: 50% 100%;
        animation-name: tree-sway;
        animation-duration: var(--duration, 10s);
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-direction: alternate;
      }

      .pine:nth-child(2n) {
        animation-delay: -2.4s;
      }

      .pine:nth-child(3n) {
        animation-delay: -4.1s;
      }

      @keyframes fog-drift {
        from {
          transform: translate3d(-18px, 0, 0);
        }
        to {
          transform: translate3d(22px, 0, 0);
        }
      }

      @keyframes forest-drift {
        from {
          transform: translate3d(-10px, 0, 0);
        }
        to {
          transform: translate3d(10px, 0, 0);
        }
      }

      @keyframes tree-sway {
        from {
          transform: rotate(-0.45deg);
        }
        to {
          transform: rotate(0.45deg);
        }
      }

      .onboarding {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(17, 17, 17, 0.94);
        opacity: 1;
      }

      .onboarding__panel {
        display: grid;
        width: min(100%, 370px);
        gap: 18px;
        padding: 32px;
        border: 1px solid rgba(75, 81, 77, 0.58);
        background: rgba(20, 24, 20, 0.94);
      }

      .onboarding__title {
        margin: 0 0 4px;
        color: var(--text);
        font-size: 24px;
        font-weight: 800;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .onboarding__hint {
        margin: -8px 0 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .date-input {
        width: 100%;
        min-height: 50px;
        padding: 0 14px;
        border: 1px solid var(--muted);
        border-radius: 0;
        outline: none;
        background: var(--bg);
        color: var(--text);
        accent-color: var(--fog);
      }

      .date-input:focus {
        border-color: var(--fog);
      }

      .begin-button {
        min-height: 50px;
        border: 1px solid var(--fog);
        border-radius: 0;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-weight: 800;
        transition:
          border-color 180ms ease,
          background 180ms ease,
          color 180ms ease;
      }

      .begin-button:hover,
      .begin-button:focus-visible {
        border-color: var(--text);
        background: var(--surface-dark);
      }

      .begin-button:disabled {
        cursor: not-allowed;
        color: var(--muted);
        border-color: var(--muted);
      }

      @media (max-width: 560px) {
        body {
          overflow-y: auto;
        }

        .experience {
          padding-right: 20px;
          padding-left: 20px;
        }

        .brand {
          font-size: 10px;
        }

        .signal-line {
          font-size: 10px;
        }

        .hero-counter__number {
          font-size: clamp(6.2rem, 32vw, 8.75rem);
        }

        .hero-counter__label {
          margin-top: 20px;
        }

        .statistics-panel {
          margin-top: 36px;
        }

        .tree-line--far {
          --tree-height: 20vh;
        }

        .tree-line--middle {
          --tree-height: 24vh;
        }

        .tree-line--near {
          --tree-height: 30vh;
        }
      }

      @media (max-height: 680px) {
        .experience {
          padding-top: 24px;
          padding-bottom: 20px;
        }

        .center-stage {
          padding-bottom: 0;
        }

        .hero-counter__number {
          font-size: clamp(6rem, 18vw, 9rem);
        }

        .statistics-panel {
          margin-top: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
